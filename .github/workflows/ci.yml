name: CI

on:
  push:
    branches: [main, feat/**, claude/**]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: recondoc_test
          POSTGRES_USER: recondoc
          POSTGRES_PASSWORD: recondoc
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U recondoc"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Compile
        run: ./gradlew compileKotlin compileTestKotlin --no-daemon

      - name: Unit tests (H2)
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Integration tests (PostgreSQL)
        run: ./gradlew test --no-daemon -Dspring.profiles.active=ci
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/recondoc_test
          DATABASE_USERNAME: recondoc
          DATABASE_PASSWORD: recondoc

      - name: Build JAR
        run: ./gradlew bootJar --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: build/reports/tests/
          retention-days: 7

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: build/libs/*.jar
          retention-days: 3

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  ocr-service:
    name: OCR Service Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ocr-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check
        run: python -m py_compile main.py

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend, ocr-service]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Build unified image (backend + frontend)
        run: docker build -t recondoc-madaef .

      - name: Build OCR service image
        run: docker build -t recondoc-madaef-ocr ocr-service/

      - name: Verify images
        run: |
          docker images recondoc-madaef --format "{{.Repository}}:{{.Tag}} {{.Size}}"
          docker images recondoc-madaef-ocr --format "{{.Repository}}:{{.Tag}} {{.Size}}"
