services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ocrsage
      POSTGRES_USER: ocrsage
      POSTGRES_PASSWORD: ocrsage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/ocrsage
      DATABASE_USERNAME: ocrsage
      DATABASE_PASSWORD: ocrsage
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      SAGE1000_BASE_URL: ${SAGE1000_BASE_URL:-http://localhost:8443}
      SAGE1000_API_KEY: ${SAGE1000_API_KEY:-}
      SAGE1000_COMPANY_CODE: ${SAGE1000_COMPANY_CODE:-DEFAULT}
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  pgdata:
