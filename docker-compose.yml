services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ocrsage
      POSTGRES_USER: ocrsage
      POSTGRES_PASSWORD: ocrsage
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocrsage"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/ocrsage
      DATABASE_USERNAME: ocrsage
      DATABASE_PASSWORD: ocrsage
      STORAGE_DIR: /app/uploads
      PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      args:
        VITE_API_URL: ""
    environment:
      BACKEND_URL: http://app:8080
      PORT: 80
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  pgdata:
  uploads:
