services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: recondoc
      POSTGRES_USER: recondoc
      POSTGRES_PASSWORD: recondoc
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recondoc"]
      interval: 5s
      timeout: 5s
      retries: 5

  ocr:
    build: ocr-service
    ports:
      - "8000:8000"
    environment:
      OCR_DPI: 300
      OCR_LANG: fr
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/recondoc
      DATABASE_USERNAME: recondoc
      DATABASE_PASSWORD: recondoc
      PADDLE_OCR_URL: http://ocr:8000
      STORAGE_DIR: /app/uploads
      PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      ocr:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      args:
        VITE_API_URL: ""
    environment:
      BACKEND_URL: http://app:8080
      PORT: 80
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  pgdata:
  uploads:
