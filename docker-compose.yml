services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: recondoc
      POSTGRES_USER: recondoc
      POSTGRES_PASSWORD: recondoc
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recondoc"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/recondoc
      DATABASE_USERNAME: recondoc
      DATABASE_PASSWORD: recondoc
      STORAGE_DIR: /app/uploads
      PORT: 8080
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      BUCKET_ENDPOINT: ${BUCKET_ENDPOINT:-}
      BUCKET_NAME: ${BUCKET_NAME:-}
      BUCKET_ACCESS_KEY_ID: ${BUCKET_ACCESS_KEY_ID:-}
      BUCKET_SECRET_ACCESS_KEY: ${BUCKET_SECRET_ACCESS_KEY:-}
      BUCKET_REGION: ${BUCKET_REGION:-auto}
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: frontend
      args:
        VITE_API_URL: ""
    environment:
      BACKEND_URL: http://app:8080
      PORT: 80
    ports:
      - "3000:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  uploads:
