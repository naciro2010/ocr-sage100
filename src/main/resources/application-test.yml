spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

claude:
  api-key: test-key
  model: claude-sonnet-4-6
  base-url: http://localhost:9999

ocr:
  paddle:
    base-url: ""
    timeout: 5
    lang: fr

storage:
  upload-dir: /tmp/ocrsage-test-uploads
