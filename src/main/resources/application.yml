spring:
  application:
    name: recondoc-madaef
  datasource:
    # On NE concatene PAS de query string a l'URL : si Railway / un proxy
    # injecte deja `?sslmode=require` dans DATABASE_URL, un second `?` casse
    # la connexion. Les options server-side (statement_timeout) sont passees
    # proprement via `data-source-properties.options` ci-dessous.
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/recondoc}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:recondoc}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:recondoc}}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:25}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT:300000}
      max-lifetime: ${DB_MAX_LIFETIME:900000}
      leak-detection-threshold: 30000
      pool-name: ReconDocPool
      data-source-properties:
        # `options` est une propriete native du driver PG : elle pousse les
        # GUC server-side a la connexion sans polluer l'URL. statement_timeout
        # protege l'app des requetes runaway, lock_timeout evite les attentes
        # bloquees sur un verrou. Surchargeable via DB_STATEMENT_TIMEOUT_MS.
        options: "-c statement_timeout=${DB_STATEMENT_TIMEOUT_MS:10000} -c lock_timeout=${DB_LOCK_TIMEOUT_MS:30000}"
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 50
          fetch_size: 100
        query:
          in_clause_parameter_padding: true
          plan_cache_max_size: 2048
  flyway:
    enabled: true
    clean-disabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    # Les migrations ont leur propre connexion : on neutralise statement_timeout
    # cote Flyway pour qu'un ALTER TABLE / CREATE INDEX sur une grosse table
    # ne soit jamais tue par les 10s par defaut de l'app. lock_timeout reste
    # raisonnable (60s) pour eviter de patienter eternellement sur un verrou.
    # En cas d'echec mid-migration, l'entree `Failed` dans flyway_schema_history
    # bloquerait les boots suivants — c'est `FlywayConfig.flywayMigrationStrategy`
    # qui appelle `repair()` avant `migrate()` pour auto-recuperer.
    init-sqls:
      - "SET statement_timeout = 0"
      - "SET lock_timeout = 60000"
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jackson:
    default-property-inclusion: non_null
  task:
    execution:
      pool:
        core-size: ${ASYNC_CORE_SIZE:10}
        max-size: ${ASYNC_MAX_SIZE:30}
        queue-capacity: 200
      thread-name-prefix: ocr-async-

# Claude API configuration
claude:
  api-key: ${CLAUDE_API_KEY:}
  model: claude-opus-4-7
  base-url: https://api.anthropic.com

# Application settings (dossier de paiement)
app:
  # tolerance-montant : ecart absolu (en MAD) tolere lors de la comparaison
  # de deux totaux issus de documents distincts (rounding sur centimes).
  # 5 centimes par defaut, suffisant pour absorber un arrondi TVA.
  tolerance-montant: ${TOLERANCE_MONTANT:0.05}
  # tolerance-montant-pct : tolerance relative (%) appliquee aux controles
  # proportionnels (R16b/R01g : qte * pu vs total ligne). Hybride avec
  # tolerance-montant : limite = max(absolu, base * pct).
  # 0.5 % par defaut. Avant cette separation, les controles relatifs
  # reutilisaient `tolerance-montant=0.05` comme pourcentage, soit 5%,
  # ce qui acceptait des ecarts de ligne tres importants.
  tolerance-montant-pct: ${TOLERANCE_MONTANT_PCT:0.005}

# OCR configuration
ocr:
  mistral:
    # Mistral Document AI (mistral-ocr-latest). Configurable aussi a chaud
    # via Parametres > Pipeline OCR dans le front.
    api-key: ${MISTRAL_API_KEY:}
    base-url: ${MISTRAL_BASE_URL:https://api.mistral.ai}
    model: ${MISTRAL_OCR_MODEL:mistral-ocr-latest}
  tesseract:
    data-path: ${TESSDATA_PREFIX:/usr/share/tessdata}
    languages: ${OCR_LANGUAGES:fra+ara+eng}
    dpi: ${OCR_DPI:300}
    oem: ${OCR_OEM:1}
    psm: ${OCR_PSM:6}
  preprocessing:
    enabled: ${OCR_PREPROCESSING:true}
    deskew: true
    binarize: true
    denoise: true
    scale-dpi: ${OCR_SCALE_DPI:300}
  confidence-threshold: ${OCR_CONFIDENCE_THRESHOLD:30}

# File storage. Default is "filesystem" (writes under ${STORAGE_DIR}).
# Switch to "s3" on Railway to persist uploaded PDFs / images in an
# S3-compatible bucket (AWS S3, Wasabi, Backblaze B2, Scaleway, MinIO).
# The bucket becomes the source of truth; the local filesystem is used
# only as a read-through cache to keep the OCR pipeline fast.
storage:
  type: ${STORAGE_TYPE:filesystem}
  upload-dir: ${STORAGE_DIR:uploads}
  extracts-subdir: ${STORAGE_EXTRACTS_SUBDIR:extracts}
  s3:
    # Variable names match Railway's default bucket credential keys (BUCKET_*)
    # with S3_* accepted as a fallback for self-hosted AWS / Wasabi setups.
    bucket: ${BUCKET_NAME:${S3_BUCKET:}}
    region: ${BUCKET_REGION:${S3_REGION:auto}}
    endpoint: ${BUCKET_ENDPOINT:${S3_ENDPOINT:}}
    access-key: ${BUCKET_ACCESS_KEY_ID:${S3_ACCESS_KEY:}}
    secret-key: ${BUCKET_SECRET_ACCESS_KEY:${S3_SECRET_KEY:}}
    force-path-style: ${S3_FORCE_PATH_STYLE:false}

# Resilience4j — protect the app from Claude API failures & bursts.
# Tuned for Sonnet 4.x Tier 1 limits; adjust via env if your plan differs.
resilience4j:
  circuitbreaker:
    instances:
      claude:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 60s
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
  ratelimiter:
    instances:
      claude:
        limitForPeriod: ${CLAUDE_RATE_LIMIT:30}
        limitRefreshPeriod: 60s
        timeoutDuration: 5s
  bulkhead:
    instances:
      claude:
        maxConcurrentCalls: ${CLAUDE_MAX_CONCURRENT:10}
        maxWaitDuration: 2s

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
      probes:
        enabled: true
  health:
    db:
      enabled: true
    diskspace:
      enabled: true

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:200}
      min-spare: 10
    connection-timeout: 20s

logging:
  level:
    com.madaef.recondoc: INFO
    http.requests: INFO
    com.zaxxer.hikari: INFO
    org.flywaydb: INFO
    org.springframework.transaction: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
