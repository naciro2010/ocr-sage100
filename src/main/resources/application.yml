spring:
  application:
    name: ocr-sage1000
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ocrsage}?options=-c%20statement_timeout%3D15000
    username: ${DATABASE_USERNAME:ocrsage}
    password: ${DATABASE_PASSWORD:ocrsage}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:10000}
      idle-timeout: ${DB_IDLE_TIMEOUT:300000}
      max-lifetime: ${DB_MAX_LIFETIME:900000}
      leak-detection-threshold: 30000
      pool-name: OcrSageHikariPool
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# Claude API configuration
claude:
  api-key: ${CLAUDE_API_KEY:}
  model: claude-sonnet-4-6
  base-url: https://api.anthropic.com

# Active ERP connector
erp:
  active: ${ERP_ACTIVE:SAGE_1000}

# Sage 1000 configuration (Objets Métiers REST API)
sage1000:
  base-url: ${SAGE1000_BASE_URL:http://localhost:8443}
  api-key: ${SAGE1000_API_KEY:}
  timeout: 30s
  company-code: ${SAGE1000_COMPANY_CODE:DEFAULT}

# Sage X3 configuration (Syracuse OData REST API)
sagex3:
  base-url: ${SAGEX3_BASE_URL:https://localhost:8124}
  client-id: ${SAGEX3_CLIENT_ID:}
  client-secret: ${SAGEX3_CLIENT_SECRET:}
  folder: ${SAGEX3_FOLDER:MAROC}
  pool-alias: ${SAGEX3_POOL_ALIAS:x3}
  token-url: ${SAGEX3_TOKEN_URL:${SAGEX3_BASE_URL:https://localhost:8124}/auth/oauth/token}

# Sage 50 configuration (REST Bridge / SDK)
sage50:
  base-url: ${SAGE50_BASE_URL:http://localhost:9090}
  username: ${SAGE50_USERNAME:admin}
  password: ${SAGE50_PASSWORD:}
  company-file: ${SAGE50_COMPANY_FILE:MAROC_2024.SAI}
  journal-code: ${SAGE50_JOURNAL_CODE:ACH}
  fiscal-year: ${SAGE50_FISCAL_YEAR:2024}

# OCR configuration
ocr:
  paddle:
    base-url: ${PADDLE_OCR_URL:}
    timeout: ${PADDLE_OCR_TIMEOUT:120}
    lang: ${PADDLE_OCR_LANG:fr}
  tesseract:
    data-path: ${TESSDATA_PREFIX:/usr/share/tesseract-ocr/5/tessdata}
    languages: ${OCR_LANGUAGES:fra+ara}
    dpi: ${OCR_DPI:300}
    oem: ${OCR_OEM:1}
    psm: ${OCR_PSM:6}
  preprocessing:
    enabled: ${OCR_PREPROCESSING:true}
    deskew: true
    binarize: true
    denoise: true
    scale-dpi: ${OCR_SCALE_DPI:300}
  confidence-threshold: ${OCR_CONFIDENCE_THRESHOLD:30}

# File storage
storage:
  upload-dir: ${STORAGE_DIR:uploads}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: 20
      min-spare: 2
    connection-timeout: 30s

logging:
  level:
    com.ocrsage: INFO
    http.requests: INFO
    com.zaxxer.hikari: INFO
    org.flywaydb: INFO
    org.springframework.transaction: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
