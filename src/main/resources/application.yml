spring:
  application:
    name: recondoc-madaef
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/recondoc}}?options=-c%20statement_timeout%3D15000
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:recondoc}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:recondoc}}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:10000}
      idle-timeout: ${DB_IDLE_TIMEOUT:300000}
      max-lifetime: ${DB_MAX_LIFETIME:900000}
      leak-detection-threshold: 30000
      pool-name: ReconDocPool
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    clean-disabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# Claude API configuration
claude:
  api-key: ${CLAUDE_API_KEY:}
  model: claude-sonnet-4-6
  base-url: https://api.anthropic.com

# Application settings (dossier de paiement)
app:
  tolerance-montant: ${TOLERANCE_MONTANT:0.05}

# OCR configuration
ocr:
  paddle:
    base-url: ${PADDLE_OCR_URL:}
    timeout: ${PADDLE_OCR_TIMEOUT:120}
    lang: ${PADDLE_OCR_LANG:fr}
  tesseract:
    data-path: ${TESSDATA_PREFIX:/usr/share/tessdata}
    languages: ${OCR_LANGUAGES:fra+ara}
    dpi: ${OCR_DPI:300}
    oem: ${OCR_OEM:1}
    psm: ${OCR_PSM:6}
  preprocessing:
    enabled: ${OCR_PREPROCESSING:true}
    deskew: true
    binarize: true
    denoise: true
    scale-dpi: ${OCR_SCALE_DPI:300}
  confidence-threshold: ${OCR_CONFIDENCE_THRESHOLD:30}

# File storage
storage:
  upload-dir: ${STORAGE_DIR:uploads}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: 20
      min-spare: 2
    connection-timeout: 30s

logging:
  level:
    com.madaef.recondoc: INFO
    http.requests: INFO
    com.zaxxer.hikari: INFO
    org.flywaydb: INFO
    org.springframework.transaction: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
